version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://db:27017
      - ENV=production
      - FRONTEND_ORIGINS=http://localhost
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app-network

  db:
    image: mongo:7.0.12   # MED-4: pinned — do not use 'latest' in production
    # MED-3: No host port mapping — MongoDB is reachable only within app-network.
    #        Remove the port binding to prevent direct external access to the DB.
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
