name: Build OPTO-PROFIT Desktop App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Ensure Release Directory Exists
        run: mkdir release -ea 0

      - name: Generate Demo File
        working-directory: ./scripts
        run: python generate_demo_opto.py

      - name: Build Executable & Package Release
        working-directory: ./desktop
        run: |
          powershell -ExecutionPolicy Bypass -File .\build.ps1
          if ($?) { powershell -ExecutionPolicy Bypass -File ..\scripts\package_release.ps1 }

      - name: Upload Release Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPTO-PROFIT-Release
          path: release/OPTO-PROFIT_v1.0.0_Release.zip
