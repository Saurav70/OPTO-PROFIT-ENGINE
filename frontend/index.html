<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>OPTOPROFIT Engine | Industrial Line Optimization by TEIRAC</title>
    <meta name="description" content="OPTOPROFIT Engine by TEIRAC — advanced assembly line balancing, floor layout optimization, and financial ROI analytics for maximum factory output and profitability." />
    <meta name="keywords" content="assembly line optimization, line balancing, factory analytics, industrial engineering, TEIRAC, OPTOPROFIT" />
    <meta name="author" content="TEIRAC Private Limited" />

    <!-- PWA Theme Color -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OPTOPROFIT Engine | Industrial Line Optimization" />
    <meta property="og:description" content="Advanced analytics and assembly line optimization for maximum factory output & profitability." />
    <meta property="og:site_name" content="OPTOPROFIT Engine" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OPTOPROFIT Engine | TEIRAC" />
    <meta name="twitter:description" content="Advanced analytics and assembly line optimization for maximum factory output & profitability." />

    <!-- Preconnect Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload font stylesheet to eliminate render-blocking @import delay -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root">
      <div id="loading-container" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; background: #0f172a; z-index: 10000; font-family: 'Inter', sans-serif;">
        <style>
          @keyframes pulse-ring {
            0% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.15); }
            100% { opacity: 0.2; transform: scale(1); }
          }
          @keyframes spin-circle {
            100% { transform: rotate(360deg); }
          }
          @keyframes pulse-text {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
          }
          .pulse-ring-div {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid rgba(13, 148, 136, 0.25);
            animation: pulse-ring 2s infinite ease-in-out;
          }
          .spin-svg-circle {
            transform-origin: 44px 44px;
            animation: spin-circle 1.2s infinite linear;
          }
          .pulse-text-p {
            animation: pulse-text 1.8s infinite ease-in-out;
          }
        </style>
        <div style="position: relative; width: 88px; height: 88px;">
          <div class="pulse-ring-div"></div>
          <svg width="88" height="88" viewBox="0 0 88 88" style="display: block;">
            <circle cx="44" cy="44" r="38" fill="none" stroke="rgba(13, 148, 136, 0.12)" stroke-width="4" />
            <circle class="spin-svg-circle" cx="44" cy="44" r="38" fill="none" stroke="#0d9488" stroke-width="4" stroke-linecap="round" stroke-dasharray="180 240" />
          </svg>
        </div>
        <div style="text-align: center;">
          <h1 style="margin: 0; font-size: 1.3rem; font-weight: 900; letter-spacing: 4px; color: #0d9488;">OPTO-PROFIT</h1>
          <p class="pulse-text-p" style="margin: 0.6rem 0 0 0; font-size: 0.62rem; font-weight: 800; letter-spacing: 3px; color: rgba(255, 255, 255, 0.35);">AUTHENTICATING SESSION</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
